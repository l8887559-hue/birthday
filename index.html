<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>🎂 翻翻生日快乐</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 开场页 -->
<div id="intro" onclick="startGame()">
  <h1>🎂 翻翻生日快乐</h1>
  <p>点击屏幕开始你的惊喜之旅 ✨</p>
</div>

<!-- 粒子背景 -->
<div class="particles"></div>

<!-- 主界面 -->
<div class="main">
  <div class="top-bar">
    <h2>快来打开你的礼物</h2>
    <div class="chances">开启机会 <span class="num" id="chanceNum">1</span></div>
  </div>

  <!-- 奖品展示 7个蜂巢式排列 -->
  <div class="prizes-wrap">
    <div class="prizes-row"><div class="ph" id="prizeGrid"></div></div>
  </div>

  <!-- 开启按钮 -->
  <button class="draw-btn" id="drawBtn" onclick="doDraw()">开启</button>

  <!-- 任务区 -->
  <div class="task-section">
    <h3>✨ 完成互动解锁机会</h3>
    <div id="taskList"></div>
  </div>

  <div style="text-align:center;margin-top:8px">
    <span onclick="resetGame()" style="color:rgba(255,255,255,.15);font-size:.7em;cursor:pointer">重置</span>
  </div>
</div>

<!-- 中奖弹窗 -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="big-emoji" id="modalEmoji">🎁</div>
    <h2 id="modalTitle">恭喜！</h2>
    <p id="modalDesc"></p>
    <button onclick="closeModal()">开心收下 💕</button>
  </div>
</div>

<!-- 完成页 -->
<div class="finish" onclick="localStorage.removeItem('bday-draw');location.reload()">
  <h1>所有礼物都是你的！</h1>
  <p class="finish-line1">这世间美好的事物，理应都是你的。</p>
  <p class="finish-line2">当然，我也是你的。</p>
  <p class="finish-sign">我的爱人，生日快乐 💕</p>
  <p class="finish-hint">点击屏幕再玩一次</p>
</div>

<script src="app.js"></script>
</body>
</html>
