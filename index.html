<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>🎂 翻翻生日快乐</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 开场页 -->
<div id="intro" onclick="startGame()">
  <h1>🎂 翻翻生日快乐</h1>
  <p>点击屏幕开始你的惊喜之旅 ✨</p>
</div>

<!-- 粒子背景 -->
<div class="particles"></div>

<!-- 主界面 -->
<div class="main">
  <div class="top-bar">
    <h2>🎁 生日礼物抽奖</h2>
    <div class="chances">抽奖机会：<span class="num" id="chanceNum">1</span> 次</div>
  </div>

  <!-- 奖品展示 -->
  <div class="prizes" id="prizeGrid"></div>

  <!-- 抽奖按钮 -->
  <button class="draw-btn" id="drawBtn" onclick="doDraw()">🎰 抽奖！</button>

  <!-- 任务区 -->
  <div class="task-section">
    <h3>✨ 完成任务赢机会</h3>
    <div id="taskList"></div>
  </div>

  <div style="text-align:center;margin-top:8px">
    <span onclick="resetGame()" style="color:rgba(255,255,255,.2);font-size:.75em;cursor:pointer">重置</span>
  </div>
</div>

<!-- 中奖弹窗 -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="big-emoji" id="modalEmoji">🎁</div>
    <h2 id="modalTitle">恭喜！</h2>
    <p id="modalDesc"></p>
    <button onclick="closeModal()">开心收下 💕</button>
  </div>
</div>

<!-- 完成页 -->
<div class="finish">
  <div class="trophy">🐶</div>
  <h1>所有礼物都是你的！</h1>
  <p style="margin-top:16px">
    当然 我也是你的<br><br>
    🎂 翻翻生日快乐 💕
  </p>
  <button onclick="localStorage.removeItem('bday-draw');location.reload()" style="margin-top:24px;padding:12px 32px;border:none;border-radius:16px;background:linear-gradient(135deg,#ff6b9d,#c44dff);color:#fff;font-size:1em;font-weight:600;cursor:pointer">🔄 再玩一次</button>
</div>

<script src="app.js"></script>
</body>
</html>
